# Number of repetitions per task (for evaluation of repeatability)
n: 3

# Model configuration
provider: openai
model: gpt-4o
model_settings:
  temperature: 1.0
  max_tokens: 4096

tasks:
  # Each task is a single scenario sent to the agent.
  # user_message: the user message sent to the agent
  # image: path to an image file, or null. Starting with the data/...
  # metadata: yours — use it however you like for analysis (category, expected output, tags, etc.)

  - user_message: "What is a gear ratio and why does it matter in mechanical design?"
    image: null
    metadata:
      category: theory

  - user_message: "Explain the difference between spur gears and helical gears."
    image: null
    metadata:
      category: theory

  - user_message: "What is shown on this image?"
    image: data/images/gear.png
    metadata:
      category: vision

  - user_message: "Convert 1500 RPM to rad/s."
    image: null
    metadata:
      category: unit_conversion

  - user_message: "A motor produces 50 N·m of torque at 3000 RPM. What is the output power?"
    image: null
    metadata:
      category: power

  - user_message: >
      I have a gear pair where the driver has 20 teeth and the driven gear has 60 teeth.
      The input torque is 10 N·m at 1000 RPM and the mesh efficiency is 0.95.
      What are the gear ratio, output torque, and output speed?
    image: null
    metadata:
      category: gear_stage
